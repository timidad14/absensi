<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Presensi Digital — Madrasah Idadiyah al-Miftah</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lato:wght@300;400;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --emerald:    #1a6b47;
      --emerald-lt: #27a469;
      --gold:       #c9963a;
      --gold-lt:    #e8b86d;
      --cream:      #f9f4ec;
      --ink:        #1c1c1c;
      --muted:      #6b6b5e;
      --glass:      rgba(255,255,255,0.08);
      --border:     rgba(201,150,58,0.35);
      --shadow:     0 24px 64px rgba(0,0,0,0.45);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Lato', sans-serif;
      background: #0f2318;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--cream);
    }

    /* ─── BACKGROUND ─────────────────────────── */
    .bg-wrap {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(26,107,71,0.45) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, rgba(201,150,58,0.20) 0%, transparent 60%),
        linear-gradient(160deg, #0d1f14 0%, #12291a 50%, #0a1a0f 100%);
    }
    .bg-wrap::after {
      content: '';
      position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9963a' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      opacity: .6;
    }

    /* ─── LAYOUT ─────────────────────────────── */
    .wrap {
      position: relative; z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 40px 20px 60px;
      display: flex; flex-direction: column; gap: 32px;
    }

    /* ─── HEADER ─────────────────────────────── */
    .header { text-align: center; }
    .header .logo-row {
      display: flex; align-items: center; justify-content: center; gap: 14px;
      margin-bottom: 10px;
    }
    .logo-emblem {
      width: 52px; height: 52px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      background: rgba(201,150,58,0.12);
      box-shadow: 0 0 16px rgba(201,150,58,0.25);
    }
    .header h1 {
      font-family: 'Cinzel', serif;
      font-size: clamp(18px, 4vw, 26px);
      font-weight: 700;
      letter-spacing: 2px;
      line-height: 1.2;
      color: var(--gold-lt);
      text-shadow: 0 0 20px rgba(201,150,58,0.4);
    }
    .header .sub {
      font-family: 'Amiri', serif;
      font-size: 15px;
      color: rgba(249,244,236,0.6);
      margin-top: 4px;
    }
    .divider-ornament {
      display: flex; align-items: center; gap: 12px;
      margin: 14px auto 0; width: fit-content;
    }
    .divider-ornament span { color: var(--gold); font-size: 18px; }
    .divider-ornament::before, .divider-ornament::after {
      content: '';
      display: block; width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    /* ─── CARD ───────────────────────────────── */
    .card {
      background: rgba(18,35,22,0.7);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .card-title {
      font-family: 'Cinzel', serif;
      font-size: 13px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 10px;
    }
    .card-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ─── FORM ───────────────────────────────── */
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(249,244,236,0.5);
      margin-bottom: 8px;
    }
    .field input, .field select {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(201,150,58,0.25);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--cream);
      font-family: 'Lato', sans-serif;
      font-size: 16px;
      transition: border-color .25s, box-shadow .25s, background .25s;
      outline: none;
    }
    .field input::placeholder { color: rgba(249,244,236,0.25); }
    .field input:focus, .field select:focus {
      border-color: var(--gold);
      background: rgba(201,150,58,0.07);
      box-shadow: 0 0 0 3px rgba(201,150,58,0.12);
    }
    .field select option { background: #1a2e20; }

    /* preview row */
    .preview-row {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
      margin-bottom: 20px;
    }
    .preview-box {
      background: rgba(26,107,71,0.12);
      border: 1px solid rgba(26,107,71,0.3);
      border-radius: 10px;
      padding: 12px 14px;
    }
    .preview-box .pb-label {
      font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--emerald-lt); margin-bottom: 4px;
    }
    .preview-box .pb-value {
      font-weight: 700; font-size: 15px;
      color: var(--cream); min-height: 22px;
    }
    .preview-box.hidden-box { display: none; }

    /* status badge */
    .status-badge {
      display: none;
      align-items: center; gap: 8px;
      font-size: 13px; padding: 10px 14px;
      border-radius: 8px; margin-bottom: 16px;
    }
    .status-badge.info  { display:flex; background: rgba(26,107,71,0.15); border:1px solid rgba(39,164,105,0.3); color:#7ed4a8; }
    .status-badge.error { display:flex; background: rgba(200,40,40,0.12); border:1px solid rgba(200,40,40,0.3); color:#f4908a; }
    .status-badge.ok    { display:flex; background: rgba(201,150,58,0.12); border:1px solid rgba(201,150,58,0.3); color:var(--gold-lt); }

    /* button */
    .btn {
      width: 100%; padding: 16px;
      border: none; border-radius: 12px;
      font-family: 'Cinzel', serif;
      font-size: 14px; letter-spacing: 2px;
      cursor: pointer;
      transition: all .25s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--emerald) 0%, var(--emerald-lt) 100%);
      color: #fff;
      box-shadow: 0 6px 24px rgba(39,164,105,0.3);
    }
    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(39,164,105,0.45);
    }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-gold {
      background: linear-gradient(135deg, #a07020 0%, var(--gold) 100%);
      color: #fff;
      box-shadow: 0 6px 24px rgba(201,150,58,0.25);
    }
    .btn-gold:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(201,150,58,0.4); }
    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--gold-lt);
    }
    .btn-outline:hover { background: rgba(201,150,58,0.08); }
    .btn-sm {
      padding: 10px 16px; font-size: 12px; width: auto;
    }

    /* ─── TABS ───────────────────────────────── */
    .tabs {
      display: flex; gap: 4px;
      background: rgba(0,0,0,0.25);
      border-radius: 12px; padding: 4px;
      margin-bottom: 28px;
    }
    .tab {
      flex: 1; padding: 11px;
      background: transparent; border: none;
      border-radius: 10px;
      font-family: 'Lato', sans-serif;
      font-size: 13px; color: rgba(249,244,236,0.5);
      cursor: pointer; transition: all .2s;
    }
    .tab.active {
      background: rgba(26,107,71,0.5);
      color: var(--cream);
      font-weight: 700;
    }

    /* ─── ARSIP ──────────────────────────────── */
    #page-arsip { display: none; }

    .filter-row {
      display: grid; grid-template-columns: 1fr 1fr auto; gap: 10px;
      align-items: end; margin-bottom: 20px;
    }
    .filter-row .field { margin-bottom: 0; }

    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      background: rgba(26,107,71,0.25);
      padding: 12px 14px;
      text-align: left;
      font-family: 'Cinzel', serif;
      font-size: 11px; letter-spacing: 1.5px;
      color: var(--gold-lt);
      white-space: nowrap;
    }
    tbody tr {
      border-top: 1px solid rgba(201,150,58,0.1);
      transition: background .15s;
    }
    tbody tr:hover { background: rgba(201,150,58,0.05); }
    tbody td { padding: 11px 14px; color: rgba(249,244,236,0.85); }
    .badge-hadir  { color: #7ed4a8; font-weight: 700; }
    .badge-alpha  { color: #f4908a; font-weight: 700; }
    .empty-state {
      text-align: center; padding: 40px 20px;
      color: rgba(249,244,236,0.3);
      font-size: 14px;
    }

    /* stats row */
    .stats-row {
      display: grid; grid-template-columns: repeat(3,1fr); gap: 10px;
      margin-bottom: 20px;
    }
    .stat-box {
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: 12px; padding: 14px;
      text-align: center;
    }
    .stat-box .sv { font-size: 26px; font-weight: 700; color: var(--gold-lt); font-family: 'Cinzel', serif; }
    .stat-box .sl { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(249,244,236,0.4); margin-top: 2px; }

    /* ─── FOOTER ─────────────────────────────── */
    footer {
      text-align: center;
      font-size: 11px; letter-spacing: 1px;
      color: rgba(249,244,236,0.2);
    }

    /* ─── LOADER ─────────────────────────────── */
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── ANIMATE IN ─────────────────────────── */
    .fade-up {
      opacity: 0; transform: translateY(18px);
      animation: fadeUp .5s ease forwards;
    }
    .fade-up:nth-child(1) { animation-delay: .1s; }
    .fade-up:nth-child(2) { animation-delay: .2s; }
    .fade-up:nth-child(3) { animation-delay: .3s; }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .filter-row { grid-template-columns: 1fr 1fr; }
      .filter-row .btn { grid-column: span 2; }
    }
  </style>
</head>
<body>
<div class="bg-wrap"></div>

<div class="wrap">

  <!-- HEADER -->
  <div class="header fade-up">
    <div class="logo-row">
      <div class="logo-emblem">🕌</div>
      <div>
        <h1>Idadiyah al-Miftah</h1>
        <div class="sub">Presensi Digital Madrasah</div>
      </div>
    </div>
    <div class="divider-ornament"><span>✦</span></div>
  </div>

  <!-- TABS -->
  <div class="fade-up" style="animation-delay:.15s">
    <div class="tabs">
      <button class="tab active" onclick="showPage('absen')">📋 Absensi</button>
      <button class="tab" onclick="showPage('arsip')">📊 Arsip</button>
    </div>

    <!-- PAGE: ABSEN -->
    <div id="page-absen">
      <div class="card">
        <div class="card-title">✦ Form Kehadiran</div>

        <div class="field">
          <label>ID PPS</label>
          <input id="inp-id" type="text" placeholder="Masukkan ID PPS Anda" autocomplete="off"
                 oninput="onIdInput()" maxlength="20"/>
        </div>

        <div id="status-badge" class="status-badge"></div>

        <div class="preview-row" id="preview-row" style="display:none">
          <div class="preview-box">
            <div class="pb-label">Nama</div>
            <div class="pb-value" id="pv-nama">—</div>
          </div>
          <div class="preview-box">
            <div class="pb-label">Domisili</div>
            <div class="pb-value" id="pv-dom">—</div>
          </div>
          <div class="preview-box">
            <div class="pb-label">Tingkatan</div>
            <div class="pb-value" id="pv-tingkat">—</div>
          </div>
          <div class="preview-box">
            <div class="pb-label">Tanggal</div>
            <div class="pb-value" id="pv-tanggal">—</div>
          </div>
        </div>

        <button class="btn btn-primary" id="btn-absen" onclick="submitAbsen()" disabled>
          <span id="btn-absen-text">✓ Tandai Hadir</span>
        </button>
      </div>
    </div>

    <!-- PAGE: ARSIP -->
    <div id="page-arsip">
      <div class="card">
        <div class="card-title">✦ Rekap Presensi</div>

        <div class="filter-row">
          <div class="field">
            <label>Bulan</label>
            <select id="fil-bulan"></select>
          </div>
          <div class="field">
            <label>Tahun</label>
            <select id="fil-tahun"></select>
          </div>
          <button class="btn btn-gold btn-sm" onclick="loadArsip()">Tampilkan</button>
        </div>

        <div class="stats-row" id="stats-row" style="display:none">
          <div class="stat-box"><div class="sv" id="st-total">0</div><div class="sl">Total</div></div>
          <div class="stat-box"><div class="sv" id="st-hadir">0</div><div class="sl">Hadir</div></div>
          <div class="stat-box"><div class="sv" id="st-unik">0</div><div class="sl">Santri</div></div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>Nama</th>
                <th>ID PPS</th>
                <th>Tingkatan</th>
                <th>Waktu</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="arsip-tbody">
              <tr><td colspan="6"><div class="empty-state">Pilih bulan & tahun lalu klik Tampilkan</div></td></tr>
            </tbody>
          </table>
        </div>

        <div style="margin-top:16px; display:flex; gap:10px; justify-content:flex-end;">
          <button class="btn btn-outline btn-sm" onclick="exportCSV()">⬇ Export CSV</button>
        </div>
      </div>
    </div>
  </div><!-- /tabs wrapper -->

  <footer class="fade-up">
    Madrasah Idadiyah al-Miftah &nbsp;·&nbsp; Sistem Presensi Digital
  </footer>
</div>

<script>
// ─── SUPABASE INIT ──────────────────────────────────────────────────
const { createClient } = supabase;
const SUPA_URL = 'https://yghrrgyyjnwkehwguhfe.supabase.co';
const SUPA_KEY = 'sb_publishable_DVo7QfAeDj7X5Wht4yAJ6g_PZDjMGC4';
const db = createClient(SUPA_URL, SUPA_KEY);

// Table names — adjust if yours differ
const TBL_GURU    = 'guru';        // columns: id_pps, nama, dom, tingkatan
const TBL_PRESENSI = 'presensi';  // columns: id_pps, nama, tingkatan, tanggal, waktu, status

// ─── STATE ─────────────────────────────────────────────────────────
let currentGuru = null;
let debounceTimer = null;
let arsipData = [];

// ─── UTILS ─────────────────────────────────────────────────────────
const todayStr = () => {
  const d = new Date();
  return d.toLocaleDateString('id-ID', { weekday:'long', day:'2-digit', month:'long', year:'numeric' });
};
const todayISO = () => new Date().toISOString().split('T')[0];
const nowTime  = () => new Date().toLocaleTimeString('id-ID', { hour:'2-digit', minute:'2-digit' });

function setStatus(type, msg) {
  const el = document.getElementById('status-badge');
  el.className = 'status-badge ' + type;
  el.innerHTML = msg;
}
function clearStatus() {
  const el = document.getElementById('status-badge');
  el.className = 'status-badge';
  el.style.display = 'none';
}

// ─── TABS ───────────────────────────────────────────────────────────
function showPage(name) {
  document.getElementById('page-absen').style.display = name === 'absen' ? '' : 'none';
  document.getElementById('page-arsip').style.display = name === 'arsip' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && name === 'absen') || (i === 1 && name === 'arsip'));
  });
  if (name === 'arsip') initFilters();
}

// ─── ID INPUT ───────────────────────────────────────────────────────
function onIdInput() {
  clearTimeout(debounceTimer);
  const val = document.getElementById('inp-id').value.trim();
  currentGuru = null;
  document.getElementById('btn-absen').disabled = true;
  document.getElementById('preview-row').style.display = 'none';
  clearStatus();
  if (val.length < 2) return;
  setStatus('info', '<div class="spinner"></div> Mencari data...');
  debounceTimer = setTimeout(() => fetchGuru(val), 500);
}

async function fetchGuru(id) {
  try {
    const { data, error } = await db
      .from(TBL_GURU)
      .select('*')
      .ilike('ID PPS', id)
      .limit(1)
      .single();

    if (error || !data) {
      setStatus('error', '✕ ID PPS tidak ditemukan dalam database');
      return;
    }

    currentGuru = data;
    document.getElementById('pv-nama').textContent    = data['NAMA'] || '—';
    document.getElementById('pv-dom').textContent     = data['DOM'] || '—';
    document.getElementById('pv-tingkat').textContent = data['TINGKATAN'] || '—';
    document.getElementById('pv-tanggal').textContent = todayStr();
    document.getElementById('preview-row').style.display = 'grid';
    clearStatus();
    document.getElementById('btn-absen').disabled = false;

  } catch(e) {
    setStatus('error', '✕ Gagal terhubung ke server');
  }
}

// ─── SUBMIT ABSEN ───────────────────────────────────────────────────
async function submitAbsen() {
  if (!currentGuru) return;
  const btn = document.getElementById('btn-absen');
  const txt = document.getElementById('btn-absen-text');
  btn.disabled = true;
  txt.innerHTML = '<div class="spinner"></div>';

  try {
    // Check if already absent today
    const { data: existing } = await db
      .from(TBL_PRESENSI)
      .select('id')
      .eq('id_pps', currentGuru['ID PPS'])
      .eq('tanggal', todayISO())
      .limit(1);

    if (existing && existing.length > 0) {
      setStatus('ok', '⚠ Anda sudah melakukan absensi hari ini');
      txt.innerHTML = '✓ Tandai Hadir';
      btn.disabled = false;
      return;
    }

    const row = {
      id_pps:    currentGuru['ID PPS'],
      nama:      currentGuru['NAMA'],
      tingkatan: currentGuru['TINGKATAN'],
      dom:       currentGuru['DOM'],
      tanggal:   todayISO(),
      waktu:     nowTime(),
      status:    'Hadir',
    };

    const { error } = await db.from(TBL_PRESENSI).insert([row]);
    if (error) throw error;

    setStatus('ok', `✓ Hadir tercatat — ${currentGuru['NAMA']} · ${nowTime()}`);
    txt.innerHTML = '✓ Tandai Hadir';
    // reset form
    document.getElementById('inp-id').value = '';
    document.getElementById('preview-row').style.display = 'none';
    currentGuru = null;

  } catch(e) {
    setStatus('error', '✕ Gagal menyimpan absensi: ' + (e.message || 'Coba lagi'));
    txt.innerHTML = '✓ Tandai Hadir';
    btn.disabled = false;
  }
}

// ─── ARSIP ──────────────────────────────────────────────────────────
function initFilters() {
  const bulanSel = document.getElementById('fil-bulan');
  const tahunSel = document.getElementById('fil-tahun');
  if (bulanSel.options.length) return; // already init

  const bulan = ['Januari','Februari','Maret','April','Mei','Juni',
                 'Juli','Agustus','September','Oktober','November','Desember'];
  bulan.forEach((b, i) => {
    const o = document.createElement('option');
    o.value = String(i + 1).padStart(2,'0');
    o.textContent = b;
    bulanSel.appendChild(o);
  });
  const now = new Date();
  bulanSel.value = String(now.getMonth() + 1).padStart(2,'0');

  for (let y = now.getFullYear(); y >= 2023; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    tahunSel.appendChild(o);
  }
}

async function loadArsip() {
  const bulan = document.getElementById('fil-bulan').value;
  const tahun = document.getElementById('fil-tahun').value;
  const from  = `${tahun}-${bulan}-01`;
  // last day of month
  const last  = new Date(tahun, parseInt(bulan), 0).getDate();
  const to    = `${tahun}-${bulan}-${last}`;

  const tbody = document.getElementById('arsip-tbody');
  tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="spinner"></div></div></td></tr>`;
  document.getElementById('stats-row').style.display = 'none';

  try {
    const { data, error } = await db
      .from(TBL_PRESENSI)
      .select('*')
      .gte('tanggal', from)
      .lte('tanggal', to)
      .order('tanggal', { ascending: true })
      .order('waktu',   { ascending: true });

    if (error) throw error;
    arsipData = data || [];
    renderArsip(arsipData);
  } catch(e) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">Gagal memuat data: ${e.message}</div></td></tr>`;
  }
}

function renderArsip(rows) {
  const tbody = document.getElementById('arsip-tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">Tidak ada data presensi bulan ini</div></td></tr>`;
    document.getElementById('stats-row').style.display = 'none';
    return;
  }

  // Stats
  const unik = new Set(rows.map(r => r.id_pps)).size;
  const hadir = rows.filter(r => r.status === 'Hadir').length;
  document.getElementById('st-total').textContent = rows.length;
  document.getElementById('st-hadir').textContent = hadir;
  document.getElementById('st-unik').textContent  = unik;
  document.getElementById('stats-row').style.display = 'grid';

  tbody.innerHTML = rows.map((r, i) => `
    <tr>
      <td style="color:rgba(249,244,236,0.35)">${i+1}</td>
      <td>${r.nama || '—'}</td>
      <td style="font-family:monospace;font-size:12px;color:var(--gold-lt)">${r.id_pps}</td>
      <td>${r.tingkatan || '—'}</td>
      <td style="color:rgba(249,244,236,0.55);font-size:12px">${formatTanggal(r.tanggal)}<br><span style="font-size:11px">${r.waktu||''}</span></td>
      <td class="${r.status === 'Hadir' ? 'badge-hadir' : 'badge-alpha'}">${r.status || 'Hadir'}</td>
    </tr>
  `).join('');
}

function formatTanggal(iso) {
  if (!iso) return '—';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric' });
}

// ─── EXPORT CSV ─────────────────────────────────────────────────────
function exportCSV() {
  if (!arsipData.length) { alert('Tidak ada data untuk diekspor.'); return; }
  const header = ['No','ID PPS','Nama','Tingkatan','Domisili','Tanggal','Waktu','Status'];
  const rows = arsipData.map((r,i) =>
    [i+1, r.id_pps, r.nama, r.tingkatan, r.dom, r.tanggal, r.waktu, r.status]
    .map(v => `"${v??''}"`)
    .join(',')
  );
  const csv = [header.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `presensi_${document.getElementById('fil-bulan').value}_${document.getElementById('fil-tahun').value}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}
